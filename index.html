<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin Active Brescia News</title>

  <style>
    @font-face {
      font-family: "Gotham";
      src: url("./fonts/Gotham-Black.otf") format("opentype");
      font-weight: 900;
      font-style: normal;
    }

    @font-face {
      font-family: "Gotham";
      src: url("./fonts/Gotham-Bold.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: "Gotham";
      src: url("./fonts/Gotham-Book.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: "GothamXLight";
      src: url("./fonts/Gotham-XLight.otf") format("opentype");
      font-weight: 200;
      font-style: normal;
    }

    :root {
      --va-red: #e30613;
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255,255,255,0.22);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "Gotham", Arial, sans-serif;
    }

    body {
      background: var(--bg);
    }

    /* SPLASH */
    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      z-index: 20;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .splash.hide {
      opacity: 0;
    }

    .splash-text {
      display: flex;
      flex-direction: column;
      gap: 8px;
      transform: translateY(0);
    }

    .splash-text span {
      font-family: "GothamXLight", Arial, sans-serif;
      font-weight: 200;
      font-size: clamp(80px, 6vw, 120px);
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.92);
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUpSoft 0.7s ease forwards;
      line-height: 0.95;
      width: fit-content;
    }

    .splash-text span:nth-child(1) { animation-delay: 0s;   opacity: 0.92; margin-left: 0px; }
    .splash-text span:nth-child(2) { animation-delay: 0.1s; opacity: 0.62; margin-left: 120px; }
    .splash-text span:nth-child(3) { animation-delay: 0.2s; opacity: 0.42; margin-left: 40px; }
    .splash-text span:nth-child(4) { animation-delay: 0.3s; opacity: 0.28; margin-left: 180px; }
    .splash-text span:nth-child(5) { animation-delay: 0.4s; opacity: 0.18; margin-left: 75px; }

    .cn {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      letter-spacing: 0.02em;
    }

    @keyframes fadeUpSoft {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: inherit;
        transform: translateY(0);
      }
    }

    /* LAYOUT */
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 90px 120px 70px 120px;
      background: #000;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 40px;
      width: 100%;
    }

    .left-top {
      flex: 1 1 auto;
      min-width: 0;
      padding-right: 40px;
    }

    .brand {
      color: var(--va-red);
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      opacity: 0.95;
      margin-bottom: 28px;
      line-height: 1;
    }

    .title-wrap {
      min-width: 0;
      overflow: hidden;
    }

    .title {
      font-size: 90px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      margin: 0;
      white-space: nowrap;
      overflow: hidden;
      transform: translateY(18px);
      opacity: 0;
      will-change: transform, opacity;
      mask-image: linear-gradient(to right, black 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, black 88%, transparent 100%);
    }

    .title.show {
      animation: titleIn 0.45s cubic-bezier(.22,.8,.2,1) forwards;
    }

    @keyframes titleIn {
      from {
        transform: translateY(18px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .right-top {
      flex: 0 0 auto;
      text-align: right;
      min-width: 320px;
    }

    .date {
      color: var(--va-red);
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 16px;
      opacity: 0.95;
    }

    .time {
      color: #fff;
      font-size: 90px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 0.9;
      margin: 0;
    }

    .line {
      width: 100%;
      height: 5px;
      background: #9e1116;
      margin: 26px 0 34px 0;
      position: relative;
      overflow: hidden;
      border-radius: 999px;
    }

    .line::after {
      content: "";
      position: absolute;
      top: 50%;
      left: -220px;
      transform: translateY(-50%);
      width: 220px;
      height: 8px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255,255,255,0.05) 20%,
        rgba(255,255,255,0.25) 40%,
        rgba(255,255,255,0.8) 65%,
        rgba(255,255,255,1) 75%,
        rgba(255,255,255,0.4) 85%,
        transparent 100%
      );
      border-radius: 999px;
      box-shadow:
        0 0 4px rgba(255,255,255,0.6),
        0 0 10px rgba(255,255,255,0.4),
        0 0 18px rgba(227,6,19,0.3);
      opacity: 0;
    }

    .line.play::after {
      animation: disney 1.4s ease-out forwards;
    }

    @keyframes disney {
      0% { left: -220px; opacity: 0; }
      12% { opacity: 1; }
      80% { left: 100%; opacity: 1; }
      100% { opacity: 0; }
    }

    .description {
      font-size: 52px;
      font-weight: 400;
      line-height: 1.6;
      letter-spacing: 0.3px;
      width: 100%;
      max-width: 100%;
      opacity: 0;
      transform: translateY(10px);
      white-space: normal;
      word-break: break-word;
    }

    .description.show {
      animation: descriptionIn 0.38s ease forwards;
    }

    @keyframes descriptionIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      position: absolute;
      right: 40px;
      bottom: 20px;
      font-size: 18px;
      font-weight: 400;
      color: var(--muted);
    }

    @media (max-width: 1600px) {
      .brand,
      .date {
        font-size: 30px;
      }

      .title,
      .time {
        font-size: 80px;
      }

      .description {
        font-size: 46px;
      }

      .right-top {
        min-width: 280px;
      }
    }

    @media (orientation: portrait) {
      .container {
        padding: 70px 50px 60px 50px;
      }

      .top-row {
        gap: 20px;
      }

      .brand,
      .date {
        font-size: 20px;
      }

      .title,
      .time {
        font-size: 56px;
      }

      .right-top {
        min-width: 180px;
      }

      .description {
        font-size: 30px;
      }

      .splash-text span {
        font-size: clamp(58px, 9vw, 92px);
      }
    }
  </style>
</head>

<body>
  <div class="splash" id="splash">
    <div class="splash-text">
      <span>CIAO</span>
      <span>WELCOME</span>
      <span>BIENVENUE</span>
      <span>WILLKOMMEN</span>
      <span class="cn">欢迎</span>
    </div>
  </div>

  <div class="container">
    <div class="top-row">
      <div class="left-top">
        <div class="brand">VIRGIN ACTIVE BRESCIA</div>
        <div class="title-wrap">
          <div class="title" id="title"></div>
        </div>
      </div>

      <div class="right-top">
        <div class="date" id="dateText"></div>
        <div class="time" id="timeText"></div>
      </div>
    </div>

    <div class="line" id="line"></div>

    <div class="description" id="description"></div>

    <div class="footer">Club News</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybpwUuhjoKeGN5Lu57HgkAw3e5xfGGQ1HkZdj8D2RQ7rnjTUByejbVVfnKnQa31Hvj/exec";
    const CACHE_KEY = "news_cache_va_brescia";
    const MIN_TIME = 6000;
    const MAX_TIME = 12000;
    const SPLASH_DURATION = 4000;

    let news = [];
    let current = 0;
    let rotateTimeout = null;
    let splashHidden = false;
    let splashTimerStarted = false;
    let hasRenderedRealNews = false;

    const fallback = [{
      title: "Benvenuto",
      description: "Virgin Active Brescia"
    }];

    const MONTHS_IT = [
      "GENNAIO", "FEBBRAIO", "MARZO", "APRILE", "MAGGIO", "GIUGNO",
      "LUGLIO", "AGOSTO", "SETTEMBRE", "OTTOBRE", "NOVEMBRE", "DICEMBRE"
    ];

    function calcTime(text) {
      const plain = (text || "").replace(/<br\s*\/?>/gi, " ");
      return Math.max(MIN_TIME, Math.min(MIN_TIME + plain.length * 35, MAX_TIME));
    }

    function formatDateTime() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const month = MONTHS_IT[now.getMonth()];
      const yyyy = now.getFullYear();

      document.getElementById("timeText").textContent = `${hh}:${mm}`;
      document.getElementById("dateText").textContent = `${dd} ${month} ${yyyy}`;
    }

    function startSplashTimer() {
      if (splashTimerStarted) return;
      splashTimerStarted = true;

      setTimeout(() => {
        if (splashHidden) return;
        splashHidden = true;
        document.getElementById("splash").classList.add("hide");
      }, SPLASH_DURATION);
    }

    function resetAnim() {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("description");
      const lineEl = document.getElementById("line");

      titleEl.classList.remove("show");
      descEl.classList.remove("show");
      lineEl.classList.remove("play");

      void lineEl.offsetWidth;
    }

    function playAnim() {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("description");
      const lineEl = document.getElementById("line");

      titleEl.classList.add("show");

      setTimeout(() => {
        lineEl.classList.add("play");
      }, 120);

      descEl.classList.add("show");

      setTimeout(() => {
        lineEl.classList.remove("play");
      }, 1500);
    }

    function scheduleNext() {
      if (rotateTimeout) clearTimeout(rotateTimeout);
      if (news.length <= 1) return;

      const delay = calcTime(news[current].description || "");
      rotateTimeout = setTimeout(next, delay);
    }

    function render(immediate = false) {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("description");

      resetAnim();

      setTimeout(() => {
        titleEl.textContent = news[current]?.title || "";
        descEl.innerHTML = news[current]?.description || "";
        playAnim();
        scheduleNext();
      }, immediate ? 0 : 70);
    }

    function sameNews(a, b) {
      return JSON.stringify(a) === JSON.stringify(b);
    }

    function getRandomStartIndex(length) {
      if (length <= 1) return 0;
      return Math.floor(Math.random() * length);
    }

    function showImmediate() {
      const cached = localStorage.getItem(CACHE_KEY);

      if (cached) {
        try {
          news = JSON.parse(cached);
        } catch {
          news = fallback;
        }
      } else {
        news = fallback;
      }

      current = 0;
      render(true);
      startSplashTimer();
    }

    async function loadNews() {
      try {
        const res = await fetch(API_URL + "?t=" + Date.now(), { cache: "no-store" });
        const data = await res.json();

        if (Array.isArray(data) && data.length) {
          const oldNews = news;
          const changed = !sameNews(oldNews, data);

          news = data;
          localStorage.setItem(CACHE_KEY, JSON.stringify(data));

          if (!hasRenderedRealNews) {
            current = getRandomStartIndex(news.length);
            hasRenderedRealNews = true;
            render(true);
            return;
          }

          if (current >= news.length) {
            current = 0;
          }

          if (changed) {
            render(true);
          }
        }
      } catch (e) {
        /* continua con cache o fallback */
      } finally {
        startSplashTimer();
      }
    }

    function next() {
      if (news.length <= 1) return;
      current = (current + 1) % news.length;
      render(false);
    }

    formatDateTime();
    setInterval(formatDateTime, 1000);

    showImmediate();
    loadNews();
    setInterval(loadNews, 60000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virgin Active Brescia News</title>

<style>

/* FONT */
@font-face {
  font-family: "Gotham";
  src: url("./fonts/Gotham-Black.otf") format("opentype");
  font-weight: 900;
}
@font-face {
  font-family: "Gotham";
  src: url("./fonts/Gotham-Bold.otf") format("opentype");
  font-weight: 700;
}
@font-face {
  font-family: "Gotham";
  src: url("./fonts/Gotham-Book.otf") format("opentype");
  font-weight: 400;
}

/* BASE */
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Gotham", Arial;
  overflow: hidden;
}

/* CIAO */
.splash {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 400;
  font-size: clamp(140px, 11vw, 200px);
  letter-spacing: 0.12em;

  color: rgba(255,255,255,0.92);
  background: #000;

  z-index: 10;
  transition: opacity 0.5s ease;
}

.splash.hide {
  opacity: 0;
}

/* LAYOUT */
.container {
  padding: 140px 80px;
}

/* HEADER */
.header {
  color: #e30613;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-bottom: 25px;
}

/* TITOLO */
.title-wrap {
  overflow: hidden;
}

.title {
  font-size: 110px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 0.95;

  transform: translateY(100%);
  opacity: 0;
}

.title.show {
  animation: rise 0.6s ease forwards;
}

@keyframes rise {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* LINEA BASE */
.line {
  height: 6px;
  background: #8f1015;
  margin: 12px 0 25px;
  position: relative;
  overflow: hidden;
  border-radius: 3px;
}

/* ⭐ COMETA PREMIUM */
.line::after {
  content: "";
  position: absolute;
  top: 50%;
  left: -140px;
  width: 140px;
  height: 16px;
  transform: translateY(-50%);
  opacity: 0;

  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,120,120,0.18) 20%,
    rgba(255,180,180,0.45) 45%,
    rgba(255,255,255,1) 75%,
    rgba(255,255,255,1) 82%,
    rgba(255,140,140,0.75) 90%,
    transparent 100%
  );

  border-radius: 999px;

  box-shadow:
    0 0 6px rgba(255,255,255,0.95),
    0 0 12px rgba(255,255,255,0.7),
    0 0 20px rgba(255,80,80,0.7),
    0 0 28px rgba(227,6,19,0.45);
}

.line.play::after {
  animation: comet 0.95s ease-out forwards;
}

@keyframes comet {
  0% {
    left: -140px;
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  85% {
    left: calc(100% + 10px);
    opacity: 1;
  }
  100% {
    opacity: 0;
  }
}

/* DESCRIZIONE */
.description {
  font-size: 48px;
  font-weight: 400;
  line-height: 1.35;

  opacity: 0;
  transform: translateY(10px);
}

.description.show {
  animation: fadeUp 0.4s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* FOOTER */
.footer {
  position: absolute;
  right: 40px;
  bottom: 20px;
  font-size: 18px;
  opacity: 0.3;
}

</style>
</head>

<body>

<div class="splash" id="splash">CIAO</div>

<div class="container">

  <div class="header">VIRGIN ACTIVE BRESCIA</div>

  <div class="title-wrap">
    <div class="title" id="title"></div>
  </div>

  <div class="line" id="line"></div>

  <div class="description" id="description"></div>

  <div class="footer">Club News</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbybpwUuhjoKeGN5Lu57HgkAw3e5xfGGQ1HkZdj8D2RQ7rnjTUByejbVVfnKnQa31Hvj/exec";

let news = [];
let current = 0;

function calcTime(text) {
  let len = text.length;
  return Math.min(12000, Math.max(6000, len * 40));
}

function showNews() {

  const t = document.getElementById("title");
  const d = document.getElementById("description");
  const l = document.getElementById("line");

  t.classList.remove("show");
  d.classList.remove("show");
  l.classList.remove("play");

  setTimeout(() => {

    t.innerText = news[current].title;
    d.innerHTML = news[current].description;

    t.classList.add("show");
    d.classList.add("show");
    l.classList.add("play");

    setTimeout(next, calcTime(news[current].description));

  }, 120);
}

function next() {
  current = (current + 1) % news.length;
  showNews();
}

async function load() {
  try {
    const res = await fetch(API + "?t=" + Date.now());
    news = await res.json();

    if (!news.length) throw "empty";

  } catch {
    news = [{
      title: "Benvenuto",
      description: "Virgin Active Brescia"
    }];
  }

  document.getElementById("splash").classList.add("hide");

  showNews();
}

load();

</script>

</body>
</html>

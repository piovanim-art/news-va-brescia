<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Virgin Active Brescia News</title>

<style>

/* FONT */
@font-face {
  font-family: "Gotham";
  src: url("./fonts/Gotham-Black.otf");
  font-weight: 900;
}
@font-face {
  font-family: "Gotham";
  src: url("./fonts/Gotham-Bold.otf");
  font-weight: 700;
}
@font-face {
  font-family: "Gotham";
  src: url("./fonts/Gotham-Book.otf");
  font-weight: 400;
}

/* BASE */
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: "Gotham", Arial;
  overflow: hidden;
}

/* SPLASH CIAO */
.splash {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;

  font-weight: 400;
  font-size: clamp(140px, 11vw, 200px);
  letter-spacing: 0.12em;

  color: rgba(255,255,255,0.92);
  background: #000;

  z-index: 10;
  transition: opacity 0.5s ease;
}

.splash.hide {
  opacity: 0;
}

/* LAYOUT */
.container {
  padding: 140px 120px; /* più centrato */
}

/* HEADER */
.header {
  color: #e30613;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.08em;
  margin-bottom: 30px;
}

/* TITOLO */
.title-wrap {
  overflow: hidden;
}

.title {
  font-size: 100px;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 0.95;

  transform: translateY(100%);
  opacity: 0;
}

.title.show {
  animation: rise 0.6s ease forwards;
}

@keyframes rise {
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* LINEA ROSSA */
.line {
  height: 5px;
  background: #9e1116;
  margin: 16px 0 30px;
  position: relative;
  overflow: hidden;
  border-radius: 999px;
}

/* SCIA DISNEY */
.line::after {
  content: "";
  position: absolute;
  top: 50%;
  left: -220px;
  transform: translateY(-50%);

  width: 220px;
  height: 8px;

  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(255,255,255,0.05) 20%,
    rgba(255,255,255,0.25) 40%,
    rgba(255,255,255,0.8) 65%,
    rgba(255,255,255,1) 75%,
    rgba(255,255,255,0.4) 85%,
    transparent 100%
  );

  border-radius: 999px;

  box-shadow:
    0 0 4px rgba(255,255,255,0.6),
    0 0 10px rgba(255,255,255,0.4),
    0 0 18px rgba(227,6,19,0.3);

  opacity: 0;
}

.line.play::after {
  animation: disney 1.4s ease-out forwards;
}

@keyframes disney {
  0% { left: -220px; opacity: 0; }
  12% { opacity: 1; }
  80% { left: 100%; opacity: 1; }
  100% { opacity: 0; }
}

/* DESCRIZIONE */
.description {
  font-size: 45px;        /* 🔥 scelto */
  line-height: 1.5;
  letter-spacing: 0.3px;
  max-width: 55%;

  opacity: 0;
  transform: translateY(10px);
}

.description.show {
  animation: fadeUp 0.4s ease forwards;
}

@keyframes fadeUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* FOOTER */
.footer {
  position: absolute;
  right: 40px;
  bottom: 20px;
  font-size: 18px;
  opacity: 0.3;
}

</style>
</head>

<body>

<div class="splash" id="splash">CIAO</div>

<div class="container">

  <div class="header">VIRGIN ACTIVE BRESCIA</div>

  <div class="title-wrap">
    <div class="title" id="title"></div>
  </div>

  <div class="line" id="line"></div>

  <div class="description" id="description"></div>

  <div class="footer">Club News</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbybpwUuhjoKeGN5Lu57HgkAw3e5xfGGQ1HkZdj8D2RQ7rnjTUByejbVVfnKnQa31Hvj/exec";

let news = [];
let current = 0;

/* TEMPO DINAMICO */
function calcTime(text) {
  let len = text.length;
  return Math.min(12000, Math.max(6000, len * 35));
}

/* RENDER */
function showNews() {

  const t = document.getElementById("title");
  const d = document.getElementById("description");
  const l = document.getElementById("line");

  t.classList.remove("show");
  d.classList.remove("show");
  l.classList.remove("play");

  setTimeout(() => {

    t.innerText = news[current].title;
    d.innerHTML = news[current].description;

    t.classList.add("show");
    d.classList.add("show");
    l.classList.add("play");

    setTimeout(next, calcTime(news[current].description));

  }, 120);
}

/* ROTAZIONE */
function next() {
  current = (current + 1) % news.length;
  showNews();
}

/* LOAD */
async function load() {
  try {
    const res = await fetch(API);
    news = await res.json();

    if (!news.length) throw "empty";

  } catch {
    news = [{
      title: "Benvenuto",
      description: "Virgin Active Brescia"
    }];
  }

  document.getElementById("splash").classList.add("hide");

  showNews();
}

load();

</script>

</body>
</html>

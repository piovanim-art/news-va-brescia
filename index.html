<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin Active Brescia News</title>

  <style>
    @font-face {
      font-family: "Gotham";
      src: url("./fonts/Gotham-Black.otf") format("opentype");
      font-weight: 900;
      font-style: normal;
    }

    @font-face {
      font-family: "Gotham";
      src: url("./fonts/Gotham-Bold.otf") format("opentype");
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: "Gotham";
      src: url("./fonts/Gotham-Book.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: "Gotham", Arial, sans-serif;
    }

    body {
      background: #000;
    }

    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: "Gotham", Arial, sans-serif;
      font-weight: 400;
      font-size: clamp(150px, 13vw, 250px);
      letter-spacing: 4px;
      z-index: 20;
      opacity: 1;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .splash.hide {
      opacity: 0;
    }

    .container {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 150px 80px 60px 80px;
      position: relative;
      background: #000;
    }

    .brand {
      color: #e31c23;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 26px;
      text-transform: uppercase;
    }

    .title-reveal {
      width: min(1200px, 88vw);
      overflow: hidden;
      margin-bottom: 0;
    }

    .title {
      font-size: 112px;
      font-weight: 900;
      line-height: 1.02;
      margin: 0;
      letter-spacing: -1px;
      transform: translateY(120%);
      opacity: 0;
      will-change: transform, opacity;
      min-height: 118px;
    }

    .title.show {
      animation: riseFromLine 0.65s cubic-bezier(.22,.8,.2,1) forwards;
    }

    @keyframes riseFromLine {
      0% {
        transform: translateY(120%);
        opacity: 0;
      }
      100% {
        transform: translateY(0%);
        opacity: 1;
      }
    }

    .line {
      width: min(1200px, 88vw);
      height: 6px;
      background: #8f1015;
      margin: 12px 0 36px 0;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }

    .line::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff3b3b, #ff6a6a, #ff3b3b);
      opacity: 0.7;
    }

    .line.glow::before {
      animation: lineGlow 0.4s ease-out forwards;
    }

    @keyframes lineGlow {
      0% { width: 0%; opacity: 0; }
      50% { width: 40%; opacity: 1; }
      100% { width: 0%; opacity: 0; }
    }

    .line::after {
      content: "";
      position: absolute;
      top: 50%;
      left: -30px;
      width: 24px;
      height: 24px;
      transform: translateY(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fff, #ff6a6a, transparent);
      opacity: 0;
    }

    .line.play::after {
      animation: comet 0.8s ease-out forwards;
    }

    @keyframes comet {
      0% { left: -30px; opacity: 0; }
      15% { opacity: 1; }
      85% { left: 100%; opacity: 1; }
      100% { opacity: 0; }
    }

    .desc {
      font-size: 58px;
      line-height: 1.36;
      max-width: 1120px;
      font-weight: 400;
      opacity: 0;
      transform: translateY(18px);
      min-height: 145px;
    }

    .desc.show {
      animation: fadeUp 0.55s ease forwards;
      animation-delay: 0.18s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .footer {
      position: absolute;
      right: 40px;
      bottom: 24px;
      font-size: 18px;
      color: rgba(255,255,255,0.22);
      font-weight: 400;
    }

    @media (orientation: portrait) {
      .container {
        padding: 120px 50px 50px 50px;
      }

      .brand {
        font-size: 20px;
      }

      .title {
        font-size: 70px;
        min-height: 78px;
      }

      .desc {
        font-size: 34px;
        max-width: 88vw;
        min-height: 100px;
      }

      .title-reveal,
      .line {
        width: 88vw;
      }

      .splash {
        font-size: clamp(110px, 18vw, 180px);
      }
    }

    @media (max-aspect-ratio: 4/3) {
      .title {
        font-size: 82px;
        min-height: 88px;
      }

      .desc {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>
  <div class="splash" id="splash">CIAO</div>

  <div class="container">
    <div class="brand">VIRGIN ACTIVE BRESCIA</div>

    <div class="title-reveal">
      <div class="title" id="title"></div>
    </div>

    <div class="line" id="line"></div>

    <div class="desc" id="desc"></div>

    <div class="footer">Club News</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybpwUuhjoKeGN5Lu57HgkAw3e5xfGGQ1HkZdj8D2RQ7rnjTUByejbVVfnKnQa31Hvj/exec";
    const CACHE_KEY = "news_cache_va_brescia";

    let news = [];
    let current = 0;
    let rotateTimeout = null;
    let splashHidden = false;

    const fallback = [{
      title: "Benvenuto",
      description: "Virgin Active Brescia"
    }];

    function calcTime(text) {
      const len = (text || "").replace(/<br>/g, " ").length;
      const time = 6000 + (len * 18);
      return Math.min(time, 12000);
    }

    function hideSplash() {
      if (splashHidden) return;
      splashHidden = true;
      document.getElementById("splash").classList.add("hide");
    }

    function resetAnim() {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("desc");
      const lineEl = document.getElementById("line");

      titleEl.classList.remove("show");
      descEl.classList.remove("show");
      lineEl.classList.remove("glow");
      lineEl.classList.remove("play");

      void lineEl.offsetWidth;
    }

    function playAnim() {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("desc");
      const lineEl = document.getElementById("line");

      titleEl.classList.add("show");

      setTimeout(() => {
        lineEl.classList.add("glow");
      }, 200);

      setTimeout(() => {
        lineEl.classList.add("play");
      }, 350);

      descEl.classList.add("show");

      setTimeout(() => {
        lineEl.classList.remove("glow");
        lineEl.classList.remove("play");
      }, 1200);
    }

    function scheduleNext() {
      if (rotateTimeout) clearTimeout(rotateTimeout);
      if (news.length <= 1) return;

      const delay = calcTime(news[current].description);
      rotateTimeout = setTimeout(next, delay);
    }

    function render(immediate = false) {
      const titleEl = document.getElementById("title");
      const descEl = document.getElementById("desc");

      resetAnim();

      setTimeout(() => {
        titleEl.innerText = news[current]?.title || "";
        descEl.innerHTML = news[current]?.description || "";
        playAnim();
        scheduleNext();
      }, immediate ? 0 : 120);
    }

    function showImmediate() {
      const cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        news = JSON.parse(cached);
      } else {
        news = fallback;
      }
      render(true);
    }

    async function loadNews() {
      try {
        const res = await fetch(API_URL + "?t=" + Date.now());
        const data = await res.json();

        if (Array.isArray(data) && data.length) {
          news = data;
          localStorage.setItem(CACHE_KEY, JSON.stringify(data));
          current = 0;

          setTimeout(() => {
            hideSplash();
            render(true);
          }, 900);
        }
      } catch (e) {
        setTimeout(() => {
          hideSplash();
        }, 900);
      }
    }

    function next() {
      if (news.length <= 1) return;
      current = (current + 1) % news.length;
      render(false);
    }

    showImmediate();
    loadNews();

    setInterval(loadNews, 60000);
  </script>
</body>
</html>

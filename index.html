<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin Active Brescia News</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .container {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 160px 80px 60px 80px;
      position: relative;
    }

    .brand {
      color: #e31c23;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 2px;
      margin-bottom: 30px;
      text-transform: uppercase;
    }

    .title {
      font-size: 110px;
      font-weight: 700;
      line-height: 1.05;
      margin: 0;
      max-width: 1200px;
      letter-spacing: -1px;
      min-height: 120px;
    }

    .line {
      width: 100%;
      max-width: 1200px;
      height: 5px;
      background: #8f1015;
      margin: 20px 0 40px 0;
      position: relative;
      overflow: hidden;
    }

    .line::after {
      content: "";
      position: absolute;
      top: -1px;
      left: -20%;
      width: 20%;
      height: 7px;
      background: linear-gradient(90deg, transparent, #fff, transparent);
      animation: scan 1.6s infinite;
      opacity: 0.9;
    }

    @keyframes scan {
      0% { left: -20%; }
      50% { left: 100%; }
      100% { left: -20%; }
    }

    .desc {
      font-size: 60px;
      line-height: 1.4;
      max-width: 1150px;
      font-weight: 400;
      min-height: 160px;
    }

    .footer {
      position: absolute;
      right: 40px;
      bottom: 24px;
      font-size: 18px;
      color: rgba(255,255,255,0.25);
    }

    /* Fade smooth */
    .fade {
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .fade.show {
      opacity: 1;
    }

    @media (orientation: portrait) {
      .container {
        padding: 120px 50px 50px 50px;
      }

      .title {
        font-size: 70px;
      }

      .desc {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="brand">VIRGIN ACTIVE BRESCIA</div>
  <div class="title fade show" id="title"></div>
  <div class="line"></div>
  <div class="desc fade show" id="desc"></div>
  <div class="footer">Club News</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbybpwUuhjoKeGN5Lu57HgkAw3e5xfGGQ1HkZdj8D2RQ7rnjTUByejbVVfnKnQa31Hvj/exec";

let news = [];
let current = 0;

// fallback immediato (zero schermo vuoto)
const fallback = [{
  title: "Benvenuto",
  description: "Virgin Active Brescia"
}];

// MOSTRA SUBITO
function showImmediate() {
  const cache = localStorage.getItem("news_cache");

  if (cache) {
    news = JSON.parse(cache);
  } else {
    news = fallback;
  }

  render(true);
}

// CARICA DATI REALI
async function loadNews() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const data = await res.json();

    if (Array.isArray(data) && data.length) {
      news = data;
      localStorage.setItem("news_cache", JSON.stringify(data));
      current = 0;
      render(true);
    }

  } catch (e) {
    console.log("errore fetch");
  }
}

// RENDER + ANIMAZIONE
function render(reset=false) {
  const titleEl = document.getElementById("title");
  const descEl = document.getElementById("desc");

  titleEl.classList.remove("show");
  descEl.classList.remove("show");

  setTimeout(() => {
    titleEl.innerText = news[current].title || "";
    descEl.innerHTML = news[current].description || "";

    titleEl.classList.add("show");
    descEl.classList.add("show");
  }, reset ? 0 : 200);
}

// ROTAZIONE
function next() {
  if (news.length <= 1) return;

  current = (current + 1) % news.length;
  render();
}

// AVVIO
showImmediate();   // istantaneo
loadNews();        // aggiornamento

setInterval(next, 8000);
setInterval(loadNews, 60000);
</script>

</body>
</html>

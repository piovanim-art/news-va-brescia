<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virgin Active Brescia News</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .container {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 100px 72px 48px 72px;
      position: relative;
      background: #000;
    }

    .brand {
      color: #e31c23;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 38px;
      text-transform: uppercase;
    }

    .title {
      font-size: 92px;
      font-weight: 700;
      line-height: 1.02;
      margin: 0;
      max-width: 1300px;
      word-break: break-word;
    }

    .line {
      width: 100%;
      max-width: 1300px;
      height: 6px;
      background: #8f1015;
      margin: 18px 0 34px 0;
      position: relative;
      overflow: hidden;
    }

    .line::after {
      content: "";
      position: absolute;
      top: -1px;
      left: -16%;
      width: 16%;
      height: 8px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.8),
        transparent
      );
      box-shadow: 0 0 18px rgba(255, 80, 80, 0.9);
      animation: scan 1.6s ease-in-out infinite;
    }

    @keyframes scan {
      0%   { left: -16%; }
      50%  { left: 100%; }
      100% { left: -16%; }
    }

    .desc {
      font-size: 42px;
      line-height: 1.36;
      max-width: 1200px;
      word-break: break-word;
    }

    .footer {
      position: absolute;
      right: 36px;
      bottom: 22px;
      font-size: 18px;
      color: rgba(255,255,255,0.32);
    }

    @media (orientation: portrait) {
      .container {
        padding: 90px 48px 42px 48px;
      }

      .brand {
        font-size: 22px;
      }

      .title {
        font-size: 64px;
        max-width: 88vw;
      }

      .desc {
        font-size: 32px;
        max-width: 88vw;
      }

      .line {
        max-width: 88vw;
      }
    }

    @media (max-aspect-ratio: 4/3) {
      .title {
        font-size: 72px;
      }

      .desc {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="brand">VIRGIN ACTIVE BRESCIA</div>
    <div class="title" id="title"></div>
    <div class="line"></div>
    <div class="desc" id="desc"></div>
    <div class="footer">Club News</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbybpwUuhjoKeGN5Lu57HgkAw3e5xfGGQ1HkZdj8D2RQ7rnjTUByejbVVfnKnQa31Hvj/exec";

    let news = [];
    let current = 0;

    async function loadNews() {
      try {
        const response = await fetch(API_URL + "?t=" + Date.now());
        const data = await response.json();

        news = Array.isArray(data) ? data : [];
        current = 0;
        showNews();
      } catch (error) {
        console.error("Errore caricamento news:", error);
        document.getElementById("title").innerText = "";
        document.getElementById("desc").innerHTML = "";
      }
    }

    function showNews() {
      if (!news.length) {
        document.getElementById("title").innerText = "";
        document.getElementById("desc").innerHTML = "";
        return;
      }

      document.getElementById("title").innerText = news[current].title || "";
      document.getElementById("desc").innerHTML = news[current].description || "";

      current = (current + 1) % news.length;
    }

    loadNews();

    setInterval(function () {
      if (news.length > 1) {
        showNews();
      }
    }, 8000);

    setInterval(function () {
      loadNews();
    }, 60000);
  </script>
</body>
</html>
